name: Build and Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install uv
      uses: astral-sh/setup-uv@v4
      with:
        enable-cache: true
        cache-dependency-glob: "**/requirements.txt"

    - name: Create virtual environment and install dependencies
      run: |
        uv venv
        uv pip install -r requirements.txt

    - name: Build with PyInstaller
      run: |
        uv run pyinstaller --onefile `
          --name "MagicLanternTagger" `
          --icon=NONE `
          --add-data "magic_lantern.jpeg;." `
          --console `
          --clean `
          auto_tagger.py

    - name: Install ffmpeg
      run: |
        choco install ffmpeg -y

    - name: Copy ffmpeg distribution files
      run: |
        $cmd = Get-Command ffmpeg -ErrorAction Stop
        $item = Get-Item $cmd.Source -Force
        $ffmpegPath = if ($item.Target) { $item.Target[0] } elseif ($item.DirectoryName -like '*\chocolatey\bin') { Join-Path $env:ChocolateyInstall 'lib\ffmpeg\tools\ffmpeg\bin\ffmpeg.exe' } else { $item.FullName }
        if (-not (Test-Path $ffmpegPath)) {
          throw "Resolved ffmpeg binary not found: $ffmpegPath"
        }
        copy $ffmpegPath dist\ffmpeg.exe
        copy README.md dist\README.md
        copy ffmpeg-LICENSE dist\ffmpeg-LICENSE
        copy ffmpeg-README.txt dist\ffmpeg-README.txt

    - name: Create Release Package
      run: |
        mkdir release
        copy dist\MagicLanternTagger.exe release\
        copy dist\ffmpeg.exe release\
        copy dist\README.md release\
        copy dist\ffmpeg-LICENSE release\
        copy dist\ffmpeg-README.txt release\

    - name: Create ZIP archive
      run: |
        Compress-Archive -Path release\* -DestinationPath MagicLanternTagger-Windows.zip

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: MagicLanternTagger-Windows
        path: MagicLanternTagger-Windows.zip

    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: |
          MagicLanternTagger-Windows.zip
          dist/MagicLanternTagger.exe
          dist/ffmpeg.exe
          dist/README.md
          dist/ffmpeg-LICENSE
          dist/ffmpeg-README.txt
        body: |
          ## Yorushika - Magic Lantern Auto Tagger v1.1.0

          ### Package contents
          - `MagicLanternTagger.exe`
          - `ffmpeg.exe`
          - `README.md`
          - `ffmpeg-LICENSE`
          - `ffmpeg-README.txt`

          ### Usage
          1. Copy `MagicLanternTagger.exe` and `ffmpeg.exe` to the folder containing your music files.
          2. Keep `README.md`, `ffmpeg-LICENSE`, and `ffmpeg-README.txt` with the distribution.
          3. Run `MagicLanternTagger.exe`.
          4. WAV files keep their original file and also create an MP3 copy in the `mp3` subfolder.

          ### Supported formats
          - MP3
          - FLAC
          - M4A/MP4
          - WAV

          See `README.md` for more details.
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
